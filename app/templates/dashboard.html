<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>BI Manager - Edição Dinâmica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .grid-dashboard { display: grid; grid-template-columns: repeat(auto-fill, minmax(480px, 1fr)); gap: 20px; }
        .chart-card { border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); background: var(--bs-body-bg); transition: box-shadow 0.3s; }
        .chart-card:hover { box-shadow: 0 8px 25px rgba(0,0,0,0.4); }
        .actions-overlay { position: absolute; top: 10px; right: 10px; z-index: 10; display: flex; gap: 5px; }
        .btn-action { width: 28px; height: 28px; padding: 0; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 0.8rem; }
    </style>
</head>
<body class="bg-body-tertiary">

<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-3 px-3">
        <div>
            <h2 class="mb-0">⚙️ Gestão de Ativos BI</h2>
            <p class="text-muted mb-0">Personalize e edite seus cruzamentos de dados</p>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-success px-4 fw-bold" onclick="abrirModalNovo()">+ Criar Gráfico</button>
            <button class="btn btn-outline-secondary" id="btnTema">🌓</button>
            <a href="/" class="btn btn-outline-primary">Voltar</a>
        </div>
    </div>

    <!-- Cards de Resumo -->
    <div class="row g-3 mb-4 px-3">
        <div class="col-md-4"><div class="card p-3 text-center bg-primary text-white border-0"><h6>Total</h6><h3>{{ total_real }}</h3></div></div>
        <div class="col-md-4"><div class="card p-3 text-center bg-success text-white border-0"><h6>Online</h6><h3>{{ stats_status.get('up', 0) }}</h3></div></div>
        <div class="col-md-4"><div class="card p-3 text-center bg-danger text-white border-0"><h6>Offline</h6><h3>{{ stats_status.get('down', 0) }}</h3></div></div>
    </div>

    <div id="dashboardGrid" class="grid-dashboard px-3"></div>
</div>

<!-- Modal Builder / Editor -->
<div class="modal fade" id="modalBuilder" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitulo">Configurar Gráfico</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="cfgId">
                <div class="mb-3">
                    <label class="form-label fw-bold">Título</label>
                    <input type="text" id="cfgTitulo" class="form-control">
                </div>
                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <label class="form-label fw-bold">Dado Base (Eixo X)</label>
                        <select id="cfgEixoX" class="form-select">
                            <option value="categoria">Categorias/Tags</option>
                            <option value="vendor">Fabricante</option>
                            <option value="status">Status</option>
                            <option value="rede_id">Rede</option>
                        </select>
                    </div>
                    <div class="col-6">
                        <label class="form-label fw-bold">Cruzar com (Série)</label>
                        <select id="cfgCruzamento" class="form-select">
                            <option value="none">Nenhum (Simples)</option>
                            <option value="status">Status (Saúde)</option>
                            <option value="categoria">Categorias</option>
                            <option value="vendor">Fabricante</option>
                        </select>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Visualização</label>
                    <select id="cfgTipo" class="form-select">
                        <option value="bar">Barras Empilhadas</option>
                        <option value="doughnut">Rosca (Donut)</option>
                        <option value="pie">Pizza</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold text-danger">Remover do Gráfico (Blacklist)</label>
                    <input type="text" id="cfgExcluir" class="form-control" placeholder="Ex: OUTROS, N/A, DESCONHECIDO">
                    <small class="text-muted">Separe os nomes por vírgula para ocultá-los deste gráfico.</small>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary w-100 fw-bold py-2" onclick="salvarGrafico()">Travar Alterações</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const dadosBrutos = {{ dispositivos_json | safe }};
    let graficos = JSON.parse(localStorage.getItem('bi_v3_config')) || [];
    const modalInst = new bootstrap.Modal(document.getElementById('modalBuilder'));

    function abrirModalNovo() {
        document.getElementById('cfgId').value = '';
        document.getElementById('cfgTitulo').value = '';
        document.getElementById('cfgExcluir').value = '';
        document.getElementById('modalTitulo').innerText = 'Criar Novo Gráfico';
        modalInst.show();
    }

    function editarGrafico(id) {
        const g = graficos.find(item => item.id === id);
        if (!g) return;
        document.getElementById('cfgId').value = g.id;
        document.getElementById('cfgTitulo').value = g.titulo;
        document.getElementById('cfgEixoX').value = g.eixoX;
        document.getElementById('cfgCruzamento').value = g.cruzamento;
        document.getElementById('cfgTipo').value = g.tipo;
        document.getElementById('cfgExcluir').value = g.excluir || "";
        document.getElementById('modalTitulo').innerText = 'Editar Gráfico';
        modalInst.show();
    }

    const stringToColor = (str, op = 1) => {
        const s = str.toUpperCase();
        if(s === 'UP' || s === 'ONLINE') return `rgba(25, 135, 84, ${op})`;
        if(s === 'DOWN' || s === 'OFFLINE') return `rgba(220, 53, 69, ${op})`;
        let hash = 0;
        for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
        return `hsla(${Math.abs(hash) % 360}, 65%, 50%, ${op})`;
    };

    function processarBI(eixoX, cruzamento, blacklist = "") {
        const info = { labels: new Set(), dataset: {} };
        const filtros = blacklist.split(',').map(f => f.trim().toUpperCase()).filter(f => f !== "");

        dadosBrutos.forEach(d => {
            const valsX = eixoX === 'categoria' ? (d[eixoX] || 'SEM TAG').split(',') : [d[eixoX] || 'N/A'];
            valsX.forEach(rawX => {
                const x = rawX.trim().toUpperCase();
                
                if (filtros.includes(x)) return; // FILTRO BLACKLIST EIXO X

                info.labels.add(x);
                if (!info.dataset[x]) info.dataset[x] = {};

                if (cruzamento === 'none') {
                    info.dataset[x]['TOTAL'] = (info.dataset[x]['TOTAL'] || 0) + 1;
                } else {
                    const valsC = cruzamento === 'categoria' ? (d[cruzamento] || 'SEM TAG').split(',') : [d[cruzamento] || 'N/A'];
                    valsC.forEach(rawC => {
                        const c = rawC.trim().toUpperCase();
                        
                        if (filtros.includes(c)) return; // FILTRO BLACKLIST CRUZAMENTO

                        info.dataset[x][c] = (info.dataset[x][c] || 0) + 1;
                    });
                }
            });
        });
        return { labels: Array.from(info.labels).sort(), dataset: info.dataset };
    }

    function salvarGrafico() {
        const id = document.getElementById('cfgId').value;
        const novoObj = {
            id: id ? parseInt(id) : Date.now(),
            titulo: document.getElementById('cfgTitulo').value || 'Insight',
            eixoX: document.getElementById('cfgEixoX').value,
            cruzamento: document.getElementById('cfgCruzamento').value,
            tipo: document.getElementById('cfgTipo').value,
            excluir: document.getElementById('cfgExcluir').value || ""
        };

        if (id) {
            const index = graficos.findIndex(g => g.id === parseInt(id));
            graficos[index] = novoObj;
        } else {
            graficos.push(novoObj);
        }

        localStorage.setItem('bi_v3_config', JSON.stringify(graficos));
        modalInst.hide();
        renderizar();
    }

    function remover(id) {
        graficos = graficos.filter(g => g.id !== id);
        localStorage.setItem('bi_v3_config', JSON.stringify(graficos));
        renderizar();
    }

    function renderizar() {
        const grid = document.getElementById('dashboardGrid');
        grid.innerHTML = '';
        graficos.forEach(config => {
            const card = document.createElement('div');
            card.className = 'card chart-card p-4 position-relative';
            card.innerHTML = `
                <div class="actions-overlay">
                    <button class="btn btn-sm btn-primary btn-action" onclick="editarGrafico(${config.id})">✎</button>
                    <button class="btn btn-sm btn-danger btn-action" onclick="remover(${config.id})">×</button>
                </div>
                <h6 class="fw-bold text-center mb-3 text-uppercase">${config.titulo}</h6>
                <div style="height: 320px;"><canvas id="c-${config.id}"></canvas></div>
            `;
            grid.appendChild(card);

            const res = processarBI(config.eixoX, config.cruzamento, config.excluir || "");
            const series = new Set();
            res.labels.forEach(l => Object.keys(res.dataset[l]).forEach(s => series.add(s)));

            const datasets = Array.from(series).map(sName => ({
                label: sName,
                data: res.labels.map(l => res.dataset[l][sName] || 0),
                backgroundColor: stringToColor(sName),
                borderWidth: 0
            }));

            new Chart(document.getElementById(`c-${config.id}`), {
                type: config.tipo,
                data: { labels: res.labels, datasets: datasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: config.tipo === 'bar' ? { x: { stacked: true }, y: { stacked: true } } : {},
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } }
                }
            });
        });
    }

    document.getElementById('btnTema').addEventListener('click', () => {
        const n = document.documentElement.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-bs-theme', n);
        localStorage.setItem('theme', n);
    });
    document.documentElement.setAttribute('data-bs-theme', localStorage.getItem('theme') || 'dark');
    renderizar();
</script>
</body>
</html>
