<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>BI Avançado - LAN Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .grid-dashboard { display: grid; grid-template-columns: repeat(auto-fill, minmax(480px, 1fr)); gap: 20px; }
        .chart-card { border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); background: var(--bs-body-bg); }
        .btn-remove { position: absolute; top: 10px; right: 10px; z-index: 10; border-radius: 50%; width: 28px; height: 28px; padding: 0; }
        .stat-card { border: none; border-radius: 10px; }
    </style>
</head>
<body class="bg-body-tertiary">

<div class="container-fluid py-4">
    <!-- Cabeçalho Organizado: Título à Esquerda, Botões à Direita -->
    <div class="d-flex justify-content-between align-items-center mb-3 px-3">
        <div>
            <h2 class="mb-0">📊 Business Intelligence</h2>
            <p class="text-muted mb-0">Análise cruzada de ativos de rede</p>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-success px-4 fw-bold" onclick="abrirModal()">+ Novo Gráfico</button>
            <button class="btn btn-outline-secondary" id="btnTema">🌓</button>
            <a href="/" class="btn btn-outline-primary">Voltar</a>
        </div>
    </div>

    <!-- Cards abaixo do Título -->
    <div class="row g-3 mb-4 px-3">
        <div class="col-md-4">
            <div class="card stat-card bg-primary text-white p-3 text-center">
                <small class="text-uppercase opacity-75">Total de Ativos</small>
                <h3 class="fw-bold mb-0">{{ total_real }}</h3>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card bg-success text-white p-3 text-center">
                <small class="text-uppercase opacity-75">Online</small>
                <h3 class="fw-bold mb-0">{{ stats_status.get('up', 0) }}</h3>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card bg-danger text-white p-3 text-center">
                <small class="text-uppercase opacity-75">Offline</small>
                <h3 class="fw-bold mb-0">{{ stats_status.get('down', 0) }}</h3>
            </div>
        </div>
    </div>

    <!-- Área dos Gráficos Customizados -->
    <div id="dashboardGrid" class="grid-dashboard px-3"></div>
</div>

<!-- Modal Builder Avançado -->
<div class="modal fade" id="modalBuilder" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Cruzamento de Dados</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label fw-bold">Título do Widget</label>
                    <input type="text" id="cfgTitulo" class="form-control" placeholder="Ex: Saúde por Categoria">
                </div>
                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <label class="form-label fw-bold">Eixo X (Principal)</label>
                        <select id="cfgEixoX" class="form-select">
                            <option value="categoria">Categorias/Tags</option>
                            <option value="vendor">Fabricante</option>
                            <option value="status">Status</option>
                            <option value="rede_id">Rede</option>
                        </select>
                    </div>
                    <div class="col-6">
                        <label class="form-label fw-bold">Cruzamento (Série)</label>
                        <select id="cfgCruzamento" class="form-select">
                            <option value="none">Apenas Contagem Simples</option>
                            <option value="status">Por Status (On/Off)</option>
                            <option value="categoria">Por Tags Secundárias</option>
                        </select>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Tipo de Visualização</label>
                    <select id="cfgTipo" class="form-select">
                        <option value="bar">Barras Empilhadas</option>
                        <option value="doughnut">Pizza (Donut)</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary w-100 py-2 fw-bold" onclick="salvarNovoGrafico()">Gerar e Fixar Gráfico</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const dadosBrutos = {{ dispositivos_json | safe }};
    let configGraficos = JSON.parse(localStorage.getItem('bi_custom_v2')) || [];
    const modalInst = new bootstrap.Modal(document.getElementById('modalBuilder'));

    function abrirModal() { modalInst.show(); }

    const stringToColor = (str, op = 1) => {
        if(str === 'UP' || str === 'ONLINE') return `rgba(25, 135, 84, ${op})`;
        if(str === 'DOWN' || str === 'OFFLINE') return `rgba(220, 53, 69, ${op})`;
        let hash = 0;
        for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
        return `hsla(${Math.abs(hash) % 360}, 65%, 50%, ${op})`;
    };

    function processarDadosCruzados(eixoX, cruzamento) {
        const labelsX = new Set();
        const mapa = {}; // { Tag: { UP: 5, DOWN: 2 } }

        dadosBrutos.forEach(d => {
            const valXRaw = d[eixoX] || 'N/A';
            const partesX = eixoX === 'categoria' ? valXRaw.split(',') : [valXRaw];

            partesX.forEach(pX => {
                const x = pX.trim().toUpperCase() || 'SEM DADO';
                labelsX.add(x);

                if (!mapa[x]) mapa[x] = {};

                if (cruzamento === 'none') {
                    mapa[x]['TOTAL'] = (mapa[x]['TOTAL'] || 0) + 1;
                } else {
                    const valC = (d[cruzamento] || 'N/A').toString().toUpperCase();
                    mapa[x][valC] = (mapa[x][valC] || 0) + 1;
                }
            });
        });

        return { labels: Array.from(labelsX), dataset: mapa };
    }

    function salvarNovoGrafico() {
        const novo = {
            id: Date.now(),
            titulo: document.getElementById('cfgTitulo').value || 'Novo Insight',
            eixoX: document.getElementById('cfgEixoX').value,
            cruzamento: document.getElementById('cfgCruzamento').value,
            tipo: document.getElementById('cfgTipo').value
        };
        configGraficos.push(novo);
        localStorage.setItem('bi_custom_v2', JSON.stringify(configGraficos));
        modalInst.hide();
        renderizarDashboard();
    }

    function removerGrafico(id) {
        configGraficos = configGraficos.filter(g => g.id !== id);
        localStorage.setItem('bi_custom_v2', JSON.stringify(configGraficos));
        renderizarDashboard();
    }

    function renderizarDashboard() {
        const grid = document.getElementById('dashboardGrid');
        grid.innerHTML = '';

        configGraficos.forEach(config => {
            const card = document.createElement('div');
            card.className = 'card chart-card p-4 position-relative';
            card.innerHTML = `
                <button class="btn btn-sm btn-outline-danger btn-remove" onclick="removerGrafico(${config.id})">×</button>
                <h6 class="fw-bold text-uppercase mb-3">${config.titulo}</h6>
                <div style="height: 320px;"><canvas id="canvas-${config.id}"></canvas></div>
            `;
            grid.appendChild(card);

            const info = processarDadosCruzados(config.eixoX, config.cruzamento);
            
            // Montar datasets para o Chart.js
            const chavesSéries = new Set();
            info.labels.forEach(l => Object.keys(info.dataset[l]).forEach(s => chavesSéries.add(s)));

            const datasets = Array.from(chavesSéries).map(serie => ({
                label: serie,
                data: info.labels.map(l => info.dataset[l][serie] || 0),
                backgroundColor: stringToColor(serie),
                borderRadius: config.tipo === 'bar' ? 5 : 0
            }));

            new Chart(document.getElementById(`canvas-${config.id}`), {
                type: config.tipo,
                data: { labels: info.labels, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: config.tipo === 'bar' ? { x: { stacked: true }, y: { stacked: true, beginAtZero: true } } : {},
                    plugins: { legend: { position: 'bottom' } }
                }
            });
        });
    }

    // Gerenciador de Tema
    document.getElementById('btnTema').addEventListener('click', () => {
        const novo = document.documentElement.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-bs-theme', novo);
        localStorage.setItem('theme', novo);
    });
    document.documentElement.setAttribute('data-bs-theme', localStorage.getItem('theme') || 'dark');

    renderizarDashboard();
</script>
</body>
</html>
